<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>セラーノート</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="セラーノート">
  <meta name="theme-color" content="#FFFFFF">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="stylesheet" href="style.css?v=20260420-9">
</head>
<body>
  <!-- 起動中 / ログイン画面 -->
  <div id="splash-screen" style="position:fixed;inset:0;background:#ffffff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;padding:32px;box-sizing:border-box;">
    <div id="__splash-loading" style="text-align:center;">
      <div style="font-size:28px;font-weight:700;color:#333;margin-bottom:8px;">セラーノート</div>
      <div style="font-size:14px;color:#999;">読み込み中...</div>
    </div>
    <div id="__splash-login" style="display:none;flex-direction:column;align-items:center;gap:16px;width:100%;max-width:320px;">
      <div style="font-size:26px;font-weight:700;color:#333;">セラーノート</div>
      <div style="font-size:13px;color:#888;text-align:center;line-height:1.7;">メールアドレスとパスワードでログイン<br><span style="font-size:11px;">※ 次回から自動でログインされます</span></div>
      <input id="__login-email" type="email" placeholder="メールアドレス" autocomplete="email"
        style="width:100%;padding:14px;border:1px solid #ddd;border-radius:8px;font-size:16px;box-sizing:border-box;">
      <input id="__login-pass" type="password" placeholder="パスワード（6文字以上）" autocomplete="current-password"
        style="width:100%;padding:14px;border:1px solid #ddd;border-radius:8px;font-size:16px;box-sizing:border-box;">
      <button onclick="window._doLogin()" style="width:100%;padding:14px;background:#333;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;">
        ログイン / 新規登録
      </button>
      <div id="__login-error" style="font-size:13px;color:#c62828;text-align:center;display:none;line-height:1.5;"></div>
    </div>
  </div>

  <div id="app" style="display:none;">
    <header id="header">
      <button id="back-btn" class="header-btn back-circle hidden" onclick="App.goBack()">‹</button>
      <h1 id="page-title" onclick="document.getElementById('main').scrollTo({top:0,behavior:'smooth'})" style="cursor:pointer;">分析</h1>
      <button id="action-btn" class="header-btn hidden"></button>
    </header>

    <main id="main"></main>

    <nav id="tab-bar">
      <!-- 分析 -->
      <button class="tab-btn active" data-tab="home" onclick="App.switchTab('home')">
        <svg viewBox="0 0 24 24"><path d="M3.5 18.5l6-6 4 4L22 6.92l-1.42-1.42-7.08 8.09-4-4L2 17l1.5 1.5z"/></svg>
        <span>分析</span>
      </button>
      <!-- 売上管理表 -->
      <button class="tab-btn" data-tab="sales" onclick="App.switchTab('sales')">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg>
        <span>売上管理表</span>
      </button>
      <!-- 商品マスタ -->
      <button class="tab-btn" data-tab="products" onclick="App.switchTab('products')">
        <svg viewBox="0 0 24 24"><path d="M20 6h-2.18c.07-.44.18-.88.18-1.36 0-2.55-2.12-4.64-4.73-4.64-1.54 0-2.91.69-3.82 1.77C8.55.69 7.18 0 5.64 0 3.03 0 .91 2.09.91 4.64c0 .48.11.92.18 1.36H-.01v14h20.01V6zm-7.82-4.64c1.48 0 2.73 1.21 2.73 2.64 0 1.43-1.25 2.36-2.73 2.36S9.46 5.43 9.46 4c0-1.43 1.27-2.64 2.72-2.64zM5.64 2C7.12 2 8.37 3.21 8.37 4.64c0 1.43-1.25 2.36-2.73 2.36S3 5.43 3 4.64C3 3.21 4.16 2 5.64 2zM2 18V8h4l5.5 1 5.5-1h4v10H2z"/></svg>
        <span>商品マスタ</span>
      </button>
      <!-- 設定 -->
      <button class="tab-btn" data-tab="settings" onclick="App.switchTab('settings')">
        <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
        <span>設定</span>
      </button>
    </nav>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <!-- Confirm Dialog -->
  <div id="confirm-overlay" class="modal-overlay hidden">
    <div id="confirm-dialog" class="confirm-dialog">
      <p id="confirm-msg"></p>
      <div class="confirm-btns">
        <button id="confirm-cancel" class="btn btn-gray">キャンセル</button>
        <button id="confirm-ok" class="btn btn-danger">削除</button>
      </div>
    </div>
  </div>

  <script src="app.js?v=20260420-9"></script>
  <script>
    // バージョンチェック：新バージョン検出時に強制リロード
    fetch('./version.json?_=' + Date.now(), {cache: 'no-store'})
      .then(r => r.json())
      .then(d => {
        const old = localStorage.getItem('sn_ver');
        localStorage.setItem('sn_ver', d.v);
        if (old && old !== d.v) { location.reload(true); }
      }).catch(() => {});

    // Service Worker全解除（キャッシュ問題を根本解決）
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(r => r.unregister());
      });
      caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
    }

  </script>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { initializeFirestore, persistentLocalCache, collection, doc, getDoc, getDocFromCache, getDocs, getDocsFromCache, setDoc, deleteDoc, writeBatch, query, where } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

    const firebaseConfig = {
      apiKey: "AIzaSyA3sQ8oKNfUYts3qrxEz3EkTZzsnEFF2AA",
      authDomain: "seller-note-9b1b8.firebaseapp.com",
      projectId: "seller-note-9b1b8",
      storageBucket: "seller-note-9b1b8.firebasestorage.app",
      messagingSenderId: "1017107110585",
      appId: "1:1017107110585:web:59f019388d8451ba1f1968"
    };

    const fbApp = initializeApp(firebaseConfig);
    window._firestore = initializeFirestore(fbApp, { localCache: persistentLocalCache() });
    window._auth = getAuth(fbApp);
    window._fs = { collection, doc, getDoc, getDocFromCache, getDocs, getDocsFromCache, setDoc, deleteDoc, writeBatch, query, where };
    window._signOut = () => signOut(window._auth);

    window._doLogin = async () => {
      const email = document.getElementById('__login-email').value.trim();
      const pass  = document.getElementById('__login-pass').value;
      const err   = document.getElementById('__login-error');
      err.style.display = 'none';
      if (!email || !pass) {
        err.textContent = 'メールアドレスとパスワードを入力してください';
        err.style.display = 'block'; return;
      }
      try {
        await signInWithEmailAndPassword(window._auth, email, pass);
      } catch(e) {
        if (e.code === 'auth/user-not-found' || e.code === 'auth/invalid-credential') {
          try {
            await createUserWithEmailAndPassword(window._auth, email, pass);
          } catch(e2) {
            const m = {'auth/weak-password':'パスワードは6文字以上にしてください','auth/invalid-email':'メールアドレスの形式が正しくありません','auth/email-already-in-use':'パスワードが違います'};
            err.textContent = m[e2.code] || 'エラー: '+e2.code;
            err.style.display = 'block';
          }
        } else {
          const m = {'auth/wrong-password':'パスワードが違います','auth/invalid-email':'メールアドレスの形式が正しくありません','auth/too-many-requests':'しばらく待ってから試してください'};
          err.textContent = m[e.code] || 'エラー: '+e.code;
          err.style.display = 'block';
        }
      }
    };

    onAuthStateChanged(window._auth, async (user) => {
      if (user && !user.isAnonymous) {
        // メール/パスワードでログイン済み → アプリを開く
        window._currentUser = user;
        document.getElementById('splash-screen').style.display = 'none';
        document.getElementById('app').style.display = '';
        if (!window._appInitialized) {
          window._appInitialized = true;
          await App.init();
        }
      } else {
        // 未ログインまたは匿名 → ログアウトしてログイン画面へ
        if (user && user.isAnonymous) await signOut(window._auth);
        document.getElementById('splash-screen').style.display = 'flex';
        document.getElementById('__splash-loading').style.display = 'none';
        document.getElementById('__splash-login').style.display = 'flex';
        document.getElementById('app').style.display = 'none';
      }
    });
  </script>
</body>
</html>
